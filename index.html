<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SILBOT — Programmable Matter Simulator</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="ui-overlay" class="side-panel">
    <h1>Programmable Matter Simulator</h1>
    <p><strong>Shift + Click</strong> on the top of the structure to place a funnel, or use the buttons below.</p>
    <hr class="divider">
    
    <div class="stats-container">
        <p>Active Agents: <span id="agent-count" class="stat">0</span></p>
        <p>Solidified Walls: <span id="sim-step" class="stat">0</span></p>
    </div>

    <div id="controls">
      <div class="btn-group">
        <button class="btn" id="btn-put-funnel" type="button" style="background-color: #3b82f6;">Put Funnel</button>
        <button class="btn" id="btn-remove-funnel" type="button" style="background-color: #f59e0b;">Remove Funnel</button>
      </div>
      <div class="btn-group" style="margin-top: 10px;">
        <button class="btn" id="btn-autofill" type="button" disabled>Start Auto-Fill</button>
      </div>
    </div>

    <hr class="divider">
    
    <div id="event-log-wrapper">
      <h2>Event Log</h2>
      <div id="event-log"></div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/lattice.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/structure.js"></script>
  <script src="js/agent.js"></script>
  <script src="js/simulator.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
